name: Price Monitor Cron

on:
  schedule:
    # Runs hourly, avoiding the 0,1,2 and 6,7,8 blocks used by Real Estate
    - cron: "0 3,4,5,9,10,11,15,16,17,21,22,23 * * *"
  workflow_dispatch:

jobs:
  run-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Cache Patchright Browsers
        uses: actions/cache@v4
        id: patchright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-patchright-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-patchright-

      - name: Install Chromium for StealthyFetcher
        run: python -m patchright install chromium --with-deps
        if: steps.patchright-cache.outputs.cache-hit != 'true'

      - name: Run price monitor
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          HOMEPAGE_MAX_PAGES: ${{ vars.HOMEPAGE_MAX_PAGES }}
          HOMEPAGE_T1_TIMEOUT: ${{ vars.HOMEPAGE_T1_TIMEOUT }}
          HOMEPAGE_T2_TIMEOUT: ${{ vars.HOMEPAGE_T2_TIMEOUT }}
          HOMEPAGE_CONCURRENT_REQUESTS: ${{ vars.HOMEPAGE_CONCURRENT_REQUESTS }}
          HOMEPAGE_CONCURRENT_REQUESTS_PER_DOMAIN: ${{ vars.HOMEPAGE_CONCURRENT_REQUESTS_PER_DOMAIN }}
          HOMEPAGE_DOWNLOAD_DELAY: ${{ vars.HOMEPAGE_DOWNLOAD_DELAY }}
          HOMEPAGE_ROBOTS_TXT_OBEY: ${{ vars.HOMEPAGE_ROBOTS_TXT_OBEY }}
          HOMEPAGE_CONTACT_KEYWORDS: ${{ vars.HOMEPAGE_CONTACT_KEYWORDS }}
        run: |
          python -c "
          import asyncio
          from price_monitor import run_monitor
          asyncio.run(run_monitor())
          "

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ecommerce-logs-${{ github.run_id }}
          path: logs/
          retention-days: 14
