name: Real Estate Monitor Cron

on:
  schedule:
    # Runs at minute 0 past every 6th hour: 00:00, 06:00, 12:00, 18:00
    - cron: "0 0,6,12,18 * * *"
  workflow_dispatch:

jobs:
  run-real-estate-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Cache Patchright Browsers
        uses: actions/cache@v4
        id: patchright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-patchright-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-patchright-

      - name: Install Chromium for StealthyFetcher
        run: python -m patchright install chromium --with-deps
        if: steps.patchright-cache.outputs.cache-hit != 'true'

      - name: Run Real Estate monitor
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python -c "
          import asyncio
          from real_estate_monitor import run_real_estate_monitor
          asyncio.run(run_real_estate_monitor())
          "

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: real-estate-logs-${{ github.run_id }}
          path: logs/
          retention-days: 14
